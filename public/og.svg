<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1f14"/>
      <stop offset="1" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="crown" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="fade" x1="760" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#052e16" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#052e16" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative chessboard on the right -->
  <g transform="translate(770,115)" opacity="0.9">
    <rect x="-6" y="-6" width="412" height="412" rx="14" fill="#0a2a18" stroke="#1f7a4d" stroke-width="2"/>
    <!-- 8x8 board, 50px squares -->
    <g>
      <!-- Row generator written out for static rendering -->
      <!-- light base -->
      <rect x="0" y="0" width="400" height="400" fill="#e9d3a8"/>
      <!-- dark squares -->
      <g fill="#7a8c5a">
        <rect x="50" y="0" width="50" height="50"/><rect x="150" y="0" width="50" height="50"/><rect x="250" y="0" width="50" height="50"/><rect x="350" y="0" width="50" height="50"/>
        <rect x="0" y="50" width="50" height="50"/><rect x="100" y="50" width="50" height="50"/><rect x="200" y="50" width="50" height="50"/><rect x="300" y="50" width="50" height="50"/>
        <rect x="50" y="100" width="50" height="50"/><rect x="150" y="100" width="50" height="50"/><rect x="250" y="100" width="50" height="50"/><rect x="350" y="100" width="50" height="50"/>
        <rect x="0" y="150" width="50" height="50"/><rect x="100" y="150" width="50" height="50"/><rect x="200" y="150" width="50" height="50"/><rect x="300" y="150" width="50" height="50"/>
        <rect x="50" y="200" width="50" height="50"/><rect x="150" y="200" width="50" height="50"/><rect x="250" y="200" width="50" height="50"/><rect x="350" y="200" width="50" height="50"/>
        <rect x="0" y="250" width="50" height="50"/><rect x="100" y="250" width="50" height="50"/><rect x="200" y="250" width="50" height="50"/><rect x="300" y="250" width="50" height="50"/>
        <rect x="50" y="300" width="50" height="50"/><rect x="150" y="300" width="50" height="50"/><rect x="250" y="300" width="50" height="50"/><rect x="350" y="300" width="50" height="50"/>
        <rect x="0" y="350" width="50" height="50"/><rect x="100" y="350" width="50" height="50"/><rect x="200" y="350" width="50" height="50"/><rect x="300" y="350" width="50" height="50"/>
      </g>
    </g>
  </g>
  <!-- fade the board into the background behind the text -->
  <rect x="760" y="0" width="440" height="630" fill="url(#fade)"/>

  <!-- Crown badge -->
  <g transform="translate(90,96)">
    <rect width="92" height="92" rx="22" fill="url(#crown)"/>
    <g transform="translate(14,14) scale(1.0)">
      <path d="M16 43 L13 23 L24 32 L32 18 L40 32 L51 23 L48 43 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>
      <rect x="16" y="43" width="32" height="6" rx="2" fill="#ffffff"/>
      <circle cx="13" cy="23" r="3" fill="#ffffff"/>
      <circle cx="32" cy="18" r="3.5" fill="#ffffff"/>
      <circle cx="51" cy="23" r="3" fill="#ffffff"/>
    </g>
  </g>

  <text x="206" y="158" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#4ade80">Chess Reinforced</text>

  <text x="90" y="290" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="82" font-weight="800" fill="#ffffff">Improve your chess,</text>
  <text x="90" y="382" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="82" font-weight="800" fill="#ffffff">one move at a time.</text>

  <text x="92" y="452" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#a7d8bb">Play Stockfish · Lichess puzzles · game review · spaced repetition</text>

  <!-- Feature chips -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="600">
    <g transform="translate(90,500)">
      <rect width="220" height="52" rx="26" fill="#16a34a"/>
      <text x="110" y="34" fill="#ffffff" text-anchor="middle">Play vs Stockfish</text>
    </g>
    <g transform="translate(326,500)">
      <rect width="210" height="52" rx="26" fill="#0a3d24" stroke="#1f7a4d" stroke-width="1.5"/>
      <text x="105" y="34" fill="#a7d8bb" text-anchor="middle">Tactics Trainer</text>
    </g>
    <g transform="translate(552,500)">
      <rect width="190" height="52" rx="26" fill="#0a3d24" stroke="#1f7a4d" stroke-width="1.5"/>
      <text x="95" y="34" fill="#a7d8bb" text-anchor="middle">Game Review</text>
    </g>
  </g>
</svg>
